<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>ASCII Roaster 🔥</title>

<style>
body {
    background: black;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.container {
    text-align: center;
    width: 500px;
}

select, button {
    padding: 8px;
    margin: 8px;
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    cursor: pointer;
}

pre {
    background: #050505;
    padding: 20px;
    border-radius: 10px;
    text-align: left;
    min-height: 180px;
    box-shadow: 0 0 10px #00ffcc;
}

#roastText {
    margin-top: 15px;
    font-size: 16px;
    min-height: 24px;
}

.toggle {
    margin: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>ASCII Roaster 🔥</h1>

    <select id="characterSelect">
        <option value="cat">Grumpy Cat</option>
        <option value="robot">Robot</option>
        <option value="wizard">Wizard</option>
        <option value="ghost">Ghost</option>
        <option value="alien">Alien</option>
        <option value="knight">Knight</option>
        <option value="skull">Skull</option>
        <option value="ai">AI Core</option>
    </select>

    <br>

    <label class="toggle">
        <input type="checkbox" id="kindMode"> Kind 😊
    </label>

    <label class="toggle">
        <input type="checkbox" id="savageMode"> Savage 🔥
    </label>

    <br>

    <button onclick="generateRoast()">Go</button>
    <button onclick="randomCharacter()">Random Character 🎲</button>

    <pre id="ascii"></pre>

</div>

function typeText(text) {
    const element = document.getElementById("roastText");
    element.textContent = "";
    let i = 0;

    const interval = setInterval(() => {
        element.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 20);
}

function generateRoast() {
    const selected = document.getElementById("characterSelect").value;
    const kind = document.getElementById("kindMode").checked;
    const savage = document.getElementById("savageMode").checked;

    const character = characters[selected];

    let lines;
    if (kind) lines = character.kind;
    else if (savage) lines = character.savage;
    else lines = character.roasts;

    const randomLine = lines[Math.floor(Math.random() * lines.length)];

    document.getElementById("ascii").textContent = character.art;
    typeText(randomLine);
}

function randomCharacter() {
    const keys = Object.keys(characters);
    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    document.getElementById("characterSelect").value = randomKey;
    generateRoast();
}
</script>
