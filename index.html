<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Roaster</title>

<style>
body {
    background: #0a0a0a;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}
.container {
    width: 700px;
    text-align: center;
}
button, select, input {
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    padding: 8px;
    margin: 6px;
}
pre {
    background: #050505;
    padding: 20px;
    border-radius: 10px;
    min-height: 220px;
    box-shadow: 0 0 12px #00ffcc;
}
#text {
    margin-top: 15px;
    min-height: 24px;
}
</style>
</head>

<body>
<div class="container">
<h1>ASCII Roaster</h1>

<select id="char"></select><br>

<label><input type="checkbox" id="kind"> Kind 😊</label>
<label><input type="checkbox" id="savage"> Savage 🔥</label><br>

<button onclick="generate()">Roast</button>
<button onclick="randomAll()">Random 🎲</button><br>

<input id="customInput" placeholder="Add your own roast">
<button onclick="addCustom()">Add</button>

<pre id="ascii"></pre>
<div id="text"></div>
</div>

<script>
let saved = JSON.parse(localStorage.getItem("customRoasts")) || {};
let history = {};

// ===== HELPER =====
function expand(base) {
    return [
        base + ".",
        "Honestly, " + base.toLowerCase() + ".",
        base + " and you stuck with it.",
        base + " which is impressive.",
        "You really decided " + base.toLowerCase() + ".",
        base + "… interesting choice.",
        base + " and didn’t question it.",
        base + " with confidence.",
        base + " and committed fully.",
        base + " like that was the plan.",
        "Somehow, " + base.toLowerCase() + ".",
        base + " without hesitation.",
        base + " and kept going.",
        base + " like it made sense.",
        base + " and doubled down.",
        base + " repeatedly.",
        base + " and never corrected it.",
        base + " all the way through.",
        base + " from start to finish.",
        base + " and called it done.",
        base + " and moved on.",
        base + " like nothing was wrong.",
        base + " and felt good about it.",
        base + " with full commitment.",
        base + " and didn’t look back.",
        base + " instantly.",
        base + " without thinking.",
        base + " and stuck with it anyway.",
        base + " like it was correct.",
        base + " and that happened."
    ];
}

// ===== CHARACTERS =====
const chars = {

cat: {
art:` /\\_/\\\n( -_- )\n > ^ <`,
roast: expand("you made that harder than it needed to be"),
savage: expand("that was completely wrong"),
kind: expand("you're improving steadily"),
rare:["⭐ The cat nods approvingly.","⭐ Rare respect earned.","⭐ Even the cat is impressed."]
},

robot: {
art:`[:::::]\n| o o |\n|  -  |\n|_____|`,
roast: expand("output requires revision"),
savage: expand("critical logic failure"),
kind: expand("performance improving"),
rare:["⭐ SYSTEM PERFECT.","⭐ ZERO ERRORS.","⭐ PERFORMANCE MAX"]
},

wizard: {
art:` /\\\n/__\\\n(oo)\n/||\\`,
roast: expand("that spell needed more thought"),
savage: expand("you summoned failure"),
kind: expand("your magic is growing"),
rare:["⭐ Perfect spell cast.","⭐ Magic flows correctly.","⭐ The wizard approves."]
},

glitch: {
art:`[0_0]#\n /|\\\n / \\`,
roast: expand("signal unclear"),
savage: expand("total system failure"),
kind: expand("system stabilizing"),
rare:["⭐ SIGNAL LOCKED.","⭐ ERROR ZERO.","⭐ STABLE STATE"]
},

frog: {
art:`(•_•)\n<) )╯\n / \\`,
roast: expand("that was a weird jump"),
savage: expand("you jumped into failure"),
kind: expand("nice hop"),
rare:["⭐ Perfect landing.","⭐ Smooth jump.","⭐ Frog approves."]
},

stone: {
art:`[----]\n |  |\n |__|`,
roast: expand("you stayed stuck"),
savage: expand("total stagnation"),
kind: expand("steady progress"),
rare:["⭐ Unshakable.","⭐ Perfect stability.","⭐ Solid."]
}

};

// ===== INIT =====
function load() {
    const select = document.getElementById("char");
    for (let key in chars) {
        let opt = document.createElement("option");
        opt.value = key;
        opt.textContent = key;
        select.appendChild(opt);
    }
}

// ===== UTIL =====
function type(text) {
    const el = document.getElementById("text");
    el.textContent = "";
    let i = 0;
    const int = setInterval(()=>{
        el.textContent += text[i];
        if(++i>=text.length) clearInterval(int);
    },15);
}

function getPool(key,mode){
    let base = chars[key][mode];
    let custom = saved[key]?.[mode] || [];
    return [...base,...custom];
}

function pickUnique(key,mode,pool){
    const id = key+"_"+mode;
    if(!history[id]) history[id]=[];

    let available = pool.filter((_,i)=>!history[id].includes(i));
    if(available.length===0){
        history[id]=[];
        available=pool;
    }

    const choice = available[Math.floor(Math.random()*available.length)];
    const index = pool.indexOf(choice);
    history[id].push(index);
    return choice;
}

// ===== MAIN =====
function generate(){
    const key = document.getElementById("char").value;
    const kind = document.getElementById("kind").checked;
    const savage = document.getElementById("savage").checked;

    let mode="roast";
    if(kind) mode="kind";
    else if(savage) mode="savage";

    let pool = getPool(key,mode);
    let line;

    if(Math.random()<0.1){
        const rare = chars[key].rare;
        line = rare[Math.floor(Math.random()*rare.length)];
    } else {
        line = pickUnique(key,mode,pool);
    }

    document.getElementById("ascii").textContent = chars[key].art;
    type(line);
}

function randomAll(){
    const keys = Object.keys(chars);
    const k = keys[Math.floor(Math.random()*keys.length)];
    document.getElementById("char").value = k;
    generate();
}

// ===== CUSTOM =====
function addCustom(){
    const input=document.getElementById("customInput");
    const text=input.value.trim();
    if(!text) return;

    const key=document.getElementById("char").value;
    const kind=document.getElementById("kind").checked;
    const savage=document.getElementById("savage").checked;

    let mode="roast";
    if(kind) mode="kind";
    else if(savage) mode="savage";

    if(!saved[key]) saved[key]={};
    if(!saved[key][mode]) saved[key][mode]=[];

    saved[key][mode].push(text);
    localStorage.setItem("customRoasts",JSON.stringify(saved));

    input.value="";
    alert("Saved!");
}

load();
</script>
</body>
</html>
