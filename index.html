<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Roaster Ultimate+</title>

<style>
body {
    background: #0a0a0a;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}
.container {
    width: 700px;
    text-align: center;
}
button, select, input {
    background: black;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    padding: 8px;
    margin: 6px;
}
pre {
    background: #050505;
    padding: 20px;
    border-radius: 10px;
    min-height: 220px;
    box-shadow: 0 0 12px #00ffcc;
}
#text { margin-top: 15px; min-height: 24px; }
.cooldown { color: #ff5555; }
</style>
</head>

<body>
<div class="container">
<h1>ASCII Roaster Ultimate+</h1>

<select id="char"></select><br>

<label><input type="checkbox" id="kind"> Kind 😊</label>
<label><input type="checkbox" id="savage"> Savage 🔥</label><br>

<button onclick="generate()">Roast</button>
<button onclick="randomAll()">Random 🎲</button>
<button onclick="toggleDecode()">Decode 🔐</button>

<div id="cooldownText"></div>

<pre id="ascii"></pre>
<div id="text"></div>
</div>

<script>
// ================= STATE =================
let cooldown = false;
let decodeMode = false;
let unlockSecret = false;
let clickCount = 0;

// ================= HELPERS =================
function expand(base){
    return Array.from({length:30},(_,i)=> base + " ("+(i+1)+")");
}

// Caesar cipher
function encode(str){
    return str.replace(/[a-z]/gi, c =>
        String.fromCharCode(
            (c <= "Z" ? 90 : 122) >= (c = c.charCodeAt(0) + 3) ? c : c - 26
        )
    );
}
function decode(str){
    return str.replace(/[a-z]/gi, c =>
        String.fromCharCode(
            (c <= "Z" ? 90 : 122) >= (c = c.charCodeAt(0) - 3) ? c : c + 26
        )
    );
}

// ================= CHARACTERS =================
const chars = {
cat:{art:"/\\_/\\\n( -_- )\n > ^ <",roast:expand("you overthought it"),savage:expand("that was wrong"),kind:expand("you're improving"),rare:["⭐ cat approves"]},
robot:{art:"[:::::]",roast:expand("output flawed"),savage:expand("system failure"),kind:expand("performance rising"),rare:["⭐ perfect system"]},
wizard:{art:"/\\\n||",roast:expand("bad spell"),savage:expand("spell failure"),kind:expand("magic growing"),rare:["⭐ perfect spell"]},
glitch:{art:"[0_0]#",roast:expand("signal weak"),savage:expand("fatal error"),kind:expand("system stabilizing"),rare:["⭐ signal locked"]},
frog:{art:"(•_•)",roast:expand("bad jump"),savage:expand("you failed jump"),kind:expand("nice hop"),rare:["⭐ perfect jump"]},
stone:{art:"[----]",roast:expand("you stayed stuck"),savage:expand("no progress"),kind:expand("steady progress"),rare:["⭐ solid"]}
};

// 🕵️ SECRET CHARACTER
const secret = {
art: "???",
roast: ["you found this..."],
savage: ["you weren't supposed to see this"],
kind: ["you decoded the system"],
rare: ["⭐ SECRET MASTER"]
};

// ================= INIT =================
function load(){
    const sel=document.getElementById("char");
    for(let k in chars){
        let o=document.createElement("option");
        o.value=k;
        o.textContent=k;
        sel.appendChild(o);
    }
}

// ================= COOLDOWN =================
function startCooldown(){
    cooldown=true;
    let t=2;
    const el=document.getElementById("cooldownText");

    const int=setInterval(()=>{
        el.textContent="Cooldown: "+t+"s";
        el.className="cooldown";
        t--;
        if(t<0){
            clearInterval(int);
            cooldown=false;
            el.textContent="";
        }
    },1000);
}

// ================= MAIN =================
function generate(){
    if(cooldown) return;

    clickCount++;
    if(clickCount===10 && !unlockSecret){
        unlockSecret=true;
        let sel=document.getElementById("char");
        let o=document.createElement("option");
        o.value="secret";
        o.textContent="???";
        sel.appendChild(o);
        alert("You unlocked something...");
    }

    const key=document.getElementById("char").value;
    let c = key==="secret" ? secret : chars[key];

    let mode="roast";
    if(document.getElementById("kind").checked) mode="kind";
    else if(document.getElementById("savage").checked) mode="savage";

    let pool=c[mode];
    let line;

    if(Math.random()<0.1){
        line=c.rare[Math.floor(Math.random()*c.rare.length)];
    } else {
        line=pool[Math.floor(Math.random()*pool.length)];
    }

    // encode if secret
    if(key==="secret" && !decodeMode){
        line = encode(line);
    }
    if(key==="secret" && decodeMode){
        line = decode(line);
    }

    document.getElementById("ascii").textContent=c.art;
    type(line);

    startCooldown();
}

// typing
function type(text){
    const el=document.getElementById("text");
    el.textContent="";
    let i=0;
    const int=setInterval(()=>{
        el.textContent+=text[i];
        if(++i>=text.length) clearInterval(int);
    },15);
}

function randomAll(){
    const keys=Object.keys(chars);
    const k=keys[Math.floor(Math.random()*keys.length)];
    document.getElementById("char").value=k;
    generate();
}

// decode toggle
function toggleDecode(){
    decodeMode=!decodeMode;
    alert("Decode mode: "+(decodeMode?"ON":"OFF"));
}

load();
</script>
</body>
</html>
